{% extends "base.html" %}
{% block content %}
<section class="auth-card auth-card-narrow">
    <div class="auth-intro compact">
        <p class="eyebrow auth-eyebrow">Patient Registration</p>
        <h2>Create your account</h2>
        <p class="muted">This creates both your patient profile and your secure email login.</p>
    </div>
    <form method="post" class="form-card auth-form">
        <label>Full name
            <input type="text" name="full_name" required>
        </label>
        <label>Email
            <input type="email" name="email" required>
        </label>
        <label>Phone
            <input type="text" name="phone" required>
        </label>
        <label>Password
            <input type="password" name="password" minlength="6" required>
        </label>
        <label>Date of birth
            <input type="date" name="date_of_birth" required>
        </label>
        <label>Gender
            <select name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </label>
        <label>Address
            <textarea name="address" rows="3" required></textarea>
        </label>
        <label>Blood group
            <input type="text" name="blood_group" placeholder="Optional">
        </label>
        <label>Allergies
            <textarea name="allergies" rows="3" placeholder="Optional"></textarea>
        </label>
        <button class="button" type="submit">Register account</button>
        <a class="button ghost center" href="{{ url_for('login') }}">Back to login</a>
    </form>
</section>
{% endblock %}
